            color: 'bg-blue-500',
            shadow: 'shadow-blue-600/50',
            ballColor: 'radial-gradient(circle at 30% 30%, #93c5fd, #3b82f6, #1e3a8a)',
            prize: '⛩️ 知名神社御守與祈福繪馬套組',
            weight: 20, // 20%
            questionType: 'situation',
            questionTypeName: '情境會話(選擇題)'
          },
          {
            id: 'green',
            name: '觀光常客',
            color: 'bg-green-500',
            shadow: 'shadow-green-600/50',
            ballColor: 'radial-gradient(circle at 30% 30%, #86efac, #22c55e, #14532d)',
            prize: '🍡 日本各地特色零食大盲盒一箱',
            weight: 25, // 25%
            questionType: 'mcq',
            questionTypeName: '綜合文法(選擇題)'
          },
          {
            id: 'white',
            name: '旅人見習生',
            color: 'bg-white',
            shadow: 'shadow-gray-300/50',
            ballColor: 'radial-gradient(circle at 30% 30%, #ffffff, #e5e7eb, #9ca3af)',
            prize: '🗻 日本絕美風景明信片組',
            weight: 25, // 25%
            questionType: 'boolean',
            questionTypeName: '日語是非題'
          }
        ];

        // --- 主要元件 ---
        function App() {
          const [gameState, setGameState] = useState('idle'); // idle, spinning, ball-dropped, level-select, quiz, result
          const [currentPrize, setCurrentPrize] = useState(null);
          const [selectedLevel, setSelectedLevel] = useState(''); // 'N5' or 'N4'
          const [currentQuestion, setCurrentQuestion] = useState(null);
          const [isCorrect, setIsCorrect] = useState(false);
          const [rotation, setRotation] = useState(0);

          // 抽獎邏輯 (根據權重)
          const drawPrize = () => {
            const totalWeight = PRIZE_TIERS.reduce((sum, tier) => sum + tier.weight, 0);
            let randomNum = Math.random() * totalWeight;
            for (const tier of PRIZE_TIERS) {
              if (randomNum < tier.weight) return tier;
              randomNum -= tier.weight;
            }
            return PRIZE_TIERS[PRIZE_TIERS.length - 1];
          };

          const handleSpin = () => {
            if (gameState !== 'idle') return;
            setGameState('spinning');
            const spinDuration = 2000; 
            const spins = 5;
            setRotation(prev => prev + (360 * spins));

            setTimeout(() => {
              const prize = drawPrize();
              setCurrentPrize(prize);
              setGameState('ball-dropped');
              
              // 球掉出後，進入選擇難度畫面
              setTimeout(() => {
                setGameState('level-select');
              }, 1500);
            }, spinDuration);
          };

          const handleLevelSelect = (level) => {
            setSelectedLevel(level);
            
            // 根據難度與獎項題型，隨機抽選一題
            const questionsForType = QUESTION_BANK[level][currentPrize.questionType];
            const randomQuestion = questionsForType[Math.floor(Math.random() * questionsForType.length)];
            
            setCurrentQuestion(randomQuestion);
            setGameState('quiz');
          };

          const submitAnswer = (ans) => {
            const expected = currentQuestion.answer.toString().trim().toLowerCase();
            const provided = ans.toString().trim().toLowerCase();

            const correct = (provided === expected);

            setIsCorrect(correct);
            setGameState('result');
          };

          const resetGame = () => {
            setGameState('idle');
            setCurrentPrize(null);
            setSelectedLevel('');
            setCurrentQuestion(null);
            setIsCorrect(false);
          };

          return (
            <div className="min-h-screen bg-[#fdf6e3] font-sans text-slate-800 flex flex-col items-center py-8 px-4 overflow-x-hidden">
              
              <header className="text-center mb-8">
                <h1 className="text-4xl md:text-5xl font-bold text-red-600 flex items-center justify-center gap-3 mb-2 drop-shadow-sm">
                  <Plane className="w-8 h-8 md:w-10 md:h-10 text-blue-500" />
                  日語旅遊 ガラポン
                  <Gift className="w-8 h-8 md:w-10 md:h-10 text-yellow-500" />
                </h1>
                <p className="text-lg text-slate-600 font-medium">轉出好禮！選擇難度完成 JLPT 文法考驗，抱走大獎！</p>
              </header>

              <main className="w-full max-w-2xl bg-white rounded-3xl shadow-xl overflow-hidden border-4 border-red-100 relative">
                <div className="absolute top-0 left-0 w-full h-32 bg-red-500 rounded-b-[50%] opacity-10 pointer-events-none"></div>

                <div className="p-8 flex flex-col items-center min-h-[500px] justify-center relative">
                  
                  {/* 狀態: 閒置 或 轉動中 或 掉出球 */}
                  {(gameState === 'idle' || gameState === 'spinning' || gameState === 'ball-dropped') && (
                    <div className="flex flex-col items-center">
                      <div className="relative w-64 h-64 mb-8">
                        <div className="absolute bottom-0 left-1/2 -translate-x-1/2 w-48 h-32 bg-amber-700 rounded-t-xl border-b-8 border-amber-900 shadow-lg z-0">
                           <div className="absolute bottom-4 left-1/2 -translate-x-1/2 w-12 h-12 bg-amber-900 rounded-full flex items-center justify-center shadow-inner">
                             <div className="w-8 h-8 bg-black rounded-full opacity-50"></div>
                           </div>
                        </div>

                        <div 
                          className="absolute top-0 left-1/2 -translate-x-1/2 w-48 h-48 z-10 transition-transform duration-[2000ms] ease-in-out"
                          style={{ transform: `rotate(${rotation}deg)` }}
                        >
                          <div className="w-full h-full rounded-full border-[16px] border-amber-500 bg-amber-100 relative shadow-2xl overflow-hidden">
                            <div className="absolute top-1/2 left-0 w-full h-1 bg-amber-300 -translate-y-1/2"></div>
                            <div className="absolute top-0 left-1/2 w-1 h-full bg-amber-300 -translate-x-1/2"></div>
                            <div className="absolute top-1/2 left-0 w-full h-1 bg-amber-300 -translate-y-1/2 rotate-45"></div>
                            <div className="absolute top-1/2 left-0 w-full h-1 bg-amber-300 -translate-y-1/2 -rotate-45"></div>
                          </div>
                          <div className="absolute top-1/2 -right-6 w-8 h-2 bg-slate-400 -translate-y-1/2 rounded-r-md">
                             <div className="absolute -top-3 -right-2 w-4 h-8 bg-red-500 rounded-full shadow-md"></div>
                          </div>
                        </div>

                        {gameState === 'ball-dropped' && currentPrize && (
                          <div 
                            className="absolute z-20 w-8 h-8 rounded-full shadow-md border-2 border-white/50 animate-bounce"
                            style={{ background: currentPrize.ballColor, bottom: '20px', left: '50%', transform: 'translateX(-50%)' }}
                          />
                        )}
                      </div>

                      {gameState === 'idle' && (
                        <button 
                          onClick={handleSpin}
                          className="group relative px-8 py-4 bg-red-500 hover:bg-red-600 text-white text-xl font-bold rounded-full shadow-[0_6px_0_#b91c1c] hover:shadow-[0_2px_0_#b91c1c] hover:translate-y-1 transition-all flex items-center gap-2"
                        >
                          <Play fill="currentColor" className="w-6 h-6" />
                          開始搖獎
                        </button>
                      )}

                      {gameState === 'spinning' && (
                        <p className="text-xl font-bold text-amber-600 animate-pulse">搖啊搖啊搖...</p>
                      )}

                      {gameState === 'ball-dropped' && (
                        <div className="text-center animate-fade-in-up">
                          <span className="inline-block px-4 py-1 rounded-full text-sm font-bold mb-2 shadow-sm border border-slate-200" style={{ backgroundColor: currentPrize.color.includes('bg-white') ? '#f8fafc' : undefined }}>
                            <span className={currentPrize.color.includes('bg-white') ? 'text-slate-800' : 'text-white'}>
                              {currentPrize.name}
                            </span>
                          </span>
                          <p className="text-2xl font-bold text-slate-800">抽中了 {currentPrize.id === 'white' ? '白球' : currentPrize.id === 'gold' ? '金球' : currentPrize.id === 'silver' ? '銀球' : currentPrize.id === 'red' ? '紅球' : currentPrize.id === 'blue' ? '藍球' : '綠球'}！</p>
                        </div>
                      )}
                    </div>
                  )}

                  {/* 狀態: 選擇難度 */}
                  {gameState === 'level-select' && (
                    <div className="flex flex-col items-center animate-scale-in w-full">
                      <GraduationCap className="w-16 h-16 text-blue-500 mb-4" />
                      <h2 className="text-2xl font-bold text-slate-800 mb-6">請選擇你的挑戰難度</h2>
                      
                      <div className="grid grid-cols-1 md:grid-cols-2 gap-4 w-full max-w-md">
                        <button 
                          onClick={() => handleLevelSelect('N5')}
                          className="flex flex-col items-center p-6 bg-emerald-50 hover:bg-emerald-100 border-2 border-emerald-300 hover:border-emerald-500 rounded-2xl transition-all shadow-sm hover:shadow-md"
                        >
                          <span className="text-3xl font-black text-emerald-600 mb-2">N5</span>
                          <span className="text-sm font-bold text-emerald-800">基礎生活與旅遊會話</span>
                          <span className="text-xs text-emerald-600 mt-2 text-center">Nが欲しいです、V-ます等</span>
                        </button>
                        
                        <button 
                          onClick={() => handleLevelSelect('N4')}
                          className="flex flex-col items-center p-6 bg-indigo-50 hover:bg-indigo-100 border-2 border-indigo-300 hover:border-indigo-500 rounded-2xl transition-all shadow-sm hover:shadow-md"
                        >
                          <span className="text-3xl font-black text-indigo-600 mb-2">N4</span>
                          <span className="text-sm font-bold text-indigo-800">進階表達與文法應用</span>
                          <span className="text-xs text-indigo-600 mt-2 text-center">V-たほうがいい、敬語等</span>
                        </button>
                      </div>
                    </div>
                  )}

                  {/* 狀態: 答題中 */}
                  {gameState === 'quiz' && currentPrize && currentQuestion && (
                    <div className="w-full max-w-lg flex flex-col items-center animate-fade-in">
                      <div className="w-full bg-slate-50 rounded-2xl p-6 border-2 border-dashed border-slate-300 relative">
                        <div className="absolute -top-4 left-1/2 -translate-x-1/2 bg-red-500 text-white px-4 py-1 rounded-full text-sm font-bold shadow-md flex items-center gap-1 whitespace-nowrap">
                          <BookOpen className="w-4 h-4" />
                          {selectedLevel} {currentPrize.questionTypeName}
                        </div>
                        
                        <div className="mt-4 text-center">
                          <p className="text-sm text-slate-500 mb-2">答對即可獲得：</p>
                          <div className={`text-lg font-bold p-3 rounded-lg border ${currentPrize.color} ${currentPrize.id === 'white' ? 'text-slate-800 border-slate-300' : 'text-white border-transparent'} mb-6 shadow-md`}>
                            {currentPrize.prize}
                          </div>
                        </div>

                        <h3 className="text-xl font-bold text-slate-800 mb-2 leading-relaxed text-center whitespace-pre-line">
                          {currentQuestion.q}
                        </h3>
                        
                        {currentQuestion.hint && (
                          <p className="text-sm text-amber-600 mb-6 text-center font-medium bg-amber-50 p-2 rounded-lg">
                            {currentQuestion.hint}
                          </p>
                        )}

                        <div className="w-full mt-6">
                          {/* 所有非是非題，全部改為四選一按鈕 */}
                          {currentPrize.questionType !== 'boolean' && (
                            <div className="flex flex-col gap-3">
                              {currentQuestion.options.map((opt, idx) => (
                                <button
                                  key={idx}
                                  onClick={() => submitAnswer(opt)}
                                  className="p-4 bg-white border-2 border-slate-200 rounded-xl hover:border-blue-500 hover:bg-blue-50 text-slate-700 font-bold transition-colors text-left pl-6"
                                >
                                  <span className="text-slate-400 mr-2">{idx + 1}.</span> {opt}
                                </button>
                              ))}
                            </div>
                          )}

                          {/* 是非題 */}
                          {currentPrize.questionType === 'boolean' && (
                            <div className="flex justify-center gap-6">
                              <button onClick={() => submitAnswer('O')} className="w-24 h-24 bg-white border-4 border-slate-200 rounded-full hover:border-green-500 hover:bg-green-50 text-green-500 text-5xl font-bold transition-colors">O</button>
                              <button onClick={() => submitAnswer('X')} className="w-24 h-24 bg-white border-4 border-slate-200 rounded-full hover:border-red-500 hover:bg-red-50 text-red-500 text-5xl font-bold transition-colors">X</button>
                            </div>
                          )}
                        </div>
                      </div>
                    </div>
                  )}

                  {/* 狀態: 顯示結果 */}
                  {gameState === 'result' && (
                    <div className="flex flex-col items-center text-center animate-scale-in">
                      {isCorrect ? (
                        <>
                          <Trophy className="w-24 h-24 text-yellow-500 mb-4 animate-bounce" />
                          <h2 className="text-4xl font-black text-slate-800 mb-2">大成功！🎉</h2>
                          <p className="text-xl text-green-600 font-bold mb-6">答案正確，恭喜過關！</p>

                          <div className="bg-slate-50 border border-green-200 p-4 rounded-2xl w-full max-w-md mb-6 text-left shadow-sm">
                            <p className="text-xs text-green-600 mb-1 font-bold">【完整解答】</p>
                            <p className="text-md font-bold text-slate-700 whitespace-pre-line leading-relaxed">{currentQuestion.fullAnswer}</p>
                          </div>

                          <div className="bg-gradient-to-r from-amber-100 to-yellow-100 border border-yellow-300 p-6 rounded-2xl w-full max-w-md shadow-lg mb-8">
                            <p className="text-sm text-slate-500 mb-1">恭喜獲得【{currentPrize.name}】獎品：</p>
                            <p className="text-2xl font-bold text-amber-700">{currentPrize.prize}</p>
                          </div>
                        </>
                      ) : (
                        <>
                          <XCircle className="w-24 h-24 text-red-500 mb-4" />
                          <h2 className="text-4xl font-black text-slate-800 mb-2">殘念... 😢</h2>
                          <p className="text-xl text-red-600 font-bold mb-6">答案錯誤，獎品飛走了！</p>

                          <div className="bg-slate-100 border border-slate-300 p-6 rounded-2xl w-full max-w-md mb-8 text-left shadow-sm">
                            <p className="text-sm text-slate-500 mb-1 font-bold">正確解答：</p>
                            <p className="text-lg font-bold text-slate-700 whitespace-pre-line leading-relaxed">{currentQuestion.fullAnswer}</p>
                          </div>
                        </>
                      )}

                      <button
                        onClick={resetGame}
                        className="px-8 py-3 bg-slate-800 hover:bg-slate-700 text-white font-bold rounded-full shadow-md flex items-center gap-2 transition-all"
                      >
                        <RotateCcw className="w-5 h-5" />
                        再玩一次
                      </button>
                    </div>
                  )}

                </div>
              </main>

              <footer className="mt-12 w-full max-w-4xl pb-8">
                <h3 className="text-center text-slate-500 font-bold mb-4">🏆 獎項與題型一覽</h3>
                <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-3">
                  {PRIZE_TIERS.map((tier) => (
                    <div key={tier.id} className="bg-white p-3 rounded-xl shadow-sm border border-slate-200 flex flex-col items-center text-center">
                      <div className="w-6 h-6 rounded-full mb-2 shadow-inner border border-slate-300" style={{ background: tier.ballColor }} />
                      <span className="text-xs font-bold text-slate-800">{tier.name}</span>
                      <span className="text-[10px] text-slate-500 mt-1 bg-slate-100 px-2 py-0.5 rounded">{tier.questionTypeName}</span>
                    </div>
                  ))}
                </div>
              </footer>
            </div>
          );
        }

        // 綁定到根節點並渲染
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
